spring:
  profiles:
    default: local
  application:
    name: 2026-spring-team1
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5434}/${POSTGRES_DB:team1db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update      # 개발 초기엔 update. 운영선 validate/none 권장
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8081

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET:team1-meeting-files}
    region:
      static: ${AWS_REGION:ap-northeast-2}
app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
