services:
  postgres:
    image: postgres:16
    container_name: team1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - team1-postgres-data:/var/lib/postgresql/data

volumes:
  team1-postgres-data:
